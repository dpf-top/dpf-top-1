<form action="https://formspree.io/f/mnjgkdap" method="POST" class="contact-form">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required class="form-control">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required class="form-control">

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone" required class="form-control">

    <label for="vehicle">Vehicle:</label>
    <input type="text" id="vehicle" name="vehicle" required class="form-control">

    <label for="mileage">Mileage:</label>
    <input type="number" id="mileage" name="mileage" required class="form-control">

    <label for="error">Error:</label>
    <textarea id="error" name="error" class="form-control" required></textarea>

    <label for="message">Message:</label>
    <textarea id="message" name="message" class="form-control" required></textarea>

    <label for="customer_type">Customer Type:</label>
    <select id="customer_type" name="customer_type" required class="form-control">
        <option value="">Select...</option>
        <option value="new">New Customer</option>
        <option value="returning">Returning Customer</option>
    </select>

    <button type="submit" class="btn btn-primary">Submit</button>
</form>
